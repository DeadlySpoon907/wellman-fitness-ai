# Railway Configuration for Wellman Fitness Backend
[build]
builder = "dockerfile"

[deploy]
startCommand = "python manage.py migrate && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.env]
DJANGO_SETTINGS_MODULE = "backend.settings"
SECRET_KEY = "@secret_key"
DEBUG = "False"
ALLOWED_HOSTS = "*"
CORS_ALLOW_ALL_ORIGINS = "True"
CORS_ALLOWED_ORIGINS = "https://wellman-fitness-rkf9l77au-deadlyspoon907s-projects.vercel.app,https://wellman-fitness-ai.vercel.app"
GEMINI_API_KEY = "@gemini_api_key"
# DATABASE_URL is automatically provided by Railway PostgreSQL plugin
# Set SEED_DB=true to seed the database with sample data (run once then set back to false)