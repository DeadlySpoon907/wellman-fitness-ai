# Railway Configuration for Wellman Fitness Backend
# Documentation: https://docs.railway.app/reference/config

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Start command: run migrations, seed data (if SEED_DB=true), then start Gunicorn
# Use $PORT from Railway environment
startCommand = "sh -c \"echo 'Starting deployment...' && python manage.py collectstatic --noinput && echo 'Running migrations...' && python manage.py migrate --noinput && echo 'Migrations completed. Seeding data...' && python seed.py && echo 'Starting Gunicorn...' && gunicorn backend.wsgi:application --bind 0.0.0.0:${PORT:-8000}\""
# Disable healthcheck - container may fail healthcheck but still serve requests
healthcheckPath = ""
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Environment variables for the deployed service
[deploy.env]
# Required Django settings
DJANGO_SETTINGS_MODULE = "backend.settings"
PYTHON_VERSION = "3.11"
PORT = "8000"

# Security - Railway injects these as environment variables:
# - SECRET_KEY: Set in Railway dashboard under Variables
# - GEMINI_API_KEY: Set in Railway dashboard under Variables

# Runtime configuration
# DEBUG should be "False" in production
DEBUG = "False"
# ALLOWED_HOSTS - explicitly list domains for security (Django settings.py has fallback)
ALLOWED_HOSTS = "wellman-backend-production.up.railway.app,wellman-fitness-version-136.vercel.app,wellman-fitness-version-136-a6yibchix-deadlyspoon907s-projects.vercel.app"
# Note: CORS settings are handled by django-cors-headers in backend/settings.py
# CORS_ALLOW_ALL_ORIGINS and CSRF_TRUSTED_ORIGINS are already configured there

# Database - Railway PostgreSQL plugin automatically provides DATABASE_URL
# No need to manually configure - it's injected automatically

# Optional: Set SEED_DB=false in Railway Variables to skip seeding (seeding runs by default)