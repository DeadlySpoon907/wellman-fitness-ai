# Railway Configuration
# This file tells Railway how to deploy your Django app

[build]
builder = "Nixpacks"

[deploy]
startCommand = "python manage.py migrate --noinput && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[build.env]
PYTHON_VERSION = "3.11"

[deploy.env]
DJANGO_SETTINGS_MODULE = "backend.settings"
SECRET_KEY = "@secret_key"
DEBUG = "False"
ALLOWED_HOSTS = "@railway_static_url"
CORS_ALLOW_ALL_ORIGINS = "False"
CORS_ALLOWED_ORIGINS = "@vercel_url"
GEMINI_API_KEY = "@gemini_api_key"