    <!-- Debug: Log errors to console for Vercel log inspection -->
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        console.error('[RUNTIME ERROR]', { message, source, lineno, colno, error: error?.stack || error });
        return false;
      };
      window.onunhandledrejection = function(event) {
        console.error('[UNHANDLED REJECTION]', event.reason);
      };
      console.log('[DEBUG] J&A Fitness Gym app starting...');
    </script>
